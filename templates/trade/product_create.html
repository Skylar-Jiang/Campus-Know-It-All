{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <div class="panel-head">
    <h2>发布商品</h2>
    <p>填写商品信息后即可在二手市场展示。</p>
  </div>

  <form method="post" class="form-grid">
    <input type="text" name="title" required placeholder="商品标题">
    <select name="category_id" required>
      <option value="">选择分类</option>
      {% for c in categories %}
      <option value="{{ c.category_id }}">{{ c.category_name }}</option>
      {% endfor %}
    </select>
    <input type="number" step="0.01" name="price" required placeholder="价格">
    <textarea name="description" rows="4" placeholder="商品描述"></textarea>
    <button type="submit">发布</button>
  </form>
</section>
{% endblock %}
