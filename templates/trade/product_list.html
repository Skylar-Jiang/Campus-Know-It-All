{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <div class="panel-head">
    <h2>二手商品列表</h2>
    <p>浏览校园二手物品，支持关键词与状态筛选。</p>
  </div>

  <form class="filter-row" method="get" action="{{ url_for('trade_products') }}">
    <input type="text" name="keyword" value="{{ keyword }}" placeholder="按商品名搜索">
    <select name="status">
      <option value="">全部状态</option>
      {% for s in ['on_sale','locked','sold','removed'] %}
      <option value="{{ s }}" {% if status == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
    <button type="submit">筛选</button>
    <a class="btn-link-inline" href="{{ url_for('trade_product_create') }}">发布商品</a>
  </form>

  <div class="table-wrap">
    <table>
      <thead>
      <tr>
        <th>ID</th><th>商品</th><th>卖家</th><th>分类</th><th>价格</th><th>状态</th><th>发布时间</th>
      </tr>
      </thead>
      <tbody>
      {% for p in products %}
      <tr>
        <td>{{ p.product_id }}</td>
        <td><a class="text-link" href="{{ url_for('trade_product_detail', product_id=p.product_id) }}">{{ p.title }}</a></td>
        <td>{{ p.seller_name }}</td>
        <td>{{ p.category_name }}</td>
        <td>{{ p.price }}</td>
        <td><span class="badge">{{ p.status }}</span></td>
        <td>{{ p.publish_time }}</td>
      </tr>
      {% else %}
      <tr><td colspan="7">暂无商品</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
